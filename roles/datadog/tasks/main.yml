---
- name: Install Datadog signing key
  ansible.builtin.shell:
    cmd: curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public | gpg --dearmor -o /usr/share/keyrings/datadog-archive-keyring.gpg
    creates: /usr/share/keyrings/datadog-archive-keyring.gpg

- name: Add Datadog repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/datadog-archive-keyring.gpg] https://apt.datadoghq.com/ stable 7"
    state: present

- name: Install Datadog agent
  ansible.builtin.apt:
    name: datadog-agent
    state: present
    update_cache: true

- name: Configure Datadog agent
  ansible.builtin.template:
    src: datadog.yaml.j2
    dest: /etc/datadog-agent/datadog.yaml
    mode: '0640'
    owner: dd-agent
    group: dd-agent

- name: Configure APM
  ansible.builtin.template:
    src: apm.yaml.j2
    dest: /etc/datadog-agent/conf.d/apm.yaml
    mode: '0640'
    owner: dd-agent
    group: dd-agent
  when: datadog_apm_enabled
