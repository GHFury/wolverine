---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - vim
      - git
      - htop
      - unzip
      - net-tools
      - ca-certificates
      - gnupg
      - tzdata
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Set timezone
  community.general.timezone:
    name: America/Los_Angeles
